<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Garcia Store | Quality Dry Goods</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="main-header">
    <div class="logo">Garcia<span>Store</span></div>
    <nav class="header-actions">
        <button class="btn-login">Sign In</button>
        <div class="cart-wrapper">
            <button class="btn-cart">🛒 Cart</button>
            <span class="badge">2</span>
        </div>
    </nav>
</header>

<section class="hero">
    <div class="hero-content">
        <h1>Fresh & Quality Dry Goods</h1>
        <p>Rice, grains, beans, and pantry essentials for every home.</p>
        <button class="btn-cta">Shop Now</button>
    </div>
</section>

<nav class="filter-section">
    <button class="pill active">All</button>
    <button class="pill">Rice</button>
    <button class="pill">Grains</button>
    <button class="pill">Beans</button>
    <button class="pill">Sugar & Flour</button>
</nav>

<main class="product-grid">

    <article class="card sale">
        <div class="card-info">
            <h3>Premium Jasmine Rice</h3>
            <p class="meta">5kg Pack</p>
            <div class="price">$12 <span class="old-price">$15</span></div>
            <button class="btn-add">Add to Cart</button>
        </div>
    </article>

    <article class="card low-stock">
        <div class="card-info">
            <h3>Whole Grain Oats</h3>
            <p class="meta">1kg Pack</p>
            <div class="price">$4</div>
            <button class="btn-add">Add to Cart</button>
        </div>
    </article>

    <article class="card">
        <div class="card-info">
            <h3>Brown Sugar</h3>
            <p class="meta">2kg Pack</p>
            <div class="price">$6</div>
            <button class="btn-add">Add to Cart</button>
        </div>
    </article>

    <article class="card">
        <div class="card-info">
            <h3>Red Kidney Beans</h3>
            <p class="meta">1kg Pack</p>
            <div class="price">$5</div>
            <button class="btn-add btn--added">Added</button>
        </div>
    </article>

</main>

</body>
</html>
